name: Check Folder Structure

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  check-files:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    # এই ধাপটি ক্লাউডের সব ফাইলের লিস্ট বের করবে
    - name: List All Files and Folders
      run: |
        echo "=== Root Directory Content ==="
        ls -la
        echo "=== Searching for MainActivity.java ==="
        find . -name "MainActivity.java"
